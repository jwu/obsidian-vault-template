# Cocogitto configuration for this Obsidian vault.
# Goal: keep commits compatible with Conventional Commits while staying lightweight.

# Merge commits are usually generated by Git/GitHub and should not block local work.
ignore_merge_commits = true

# Allow Git autosquash helper commits during local cleanup.
ignore_fixup_commits = true

# Keep this v1 focused on commit message validation only.
disable_changelog = true
disable_bump_commit = true

# Valid commit scopes for this vault.
# Keep the first pass intentionally small: daily notes, archive entries,
# knowledge notes, active projects, todos, ideas, and research notes.
scopes = ["daily", "archive", "knowledge", "project", "todo", "idea", "research"]

[git_hooks.commit-msg]
script = '''
#!/bin/sh
cog verify --file "$1"
'''

# Standard Conventional Commits / Angular-style types.
# Unknown types are rejected, which keeps the history vocabulary small and predictable.
[commit_types]
feat = { changelog_title = "Features" }
fix = { changelog_title = "Bug Fixes" }
docs = { changelog_title = "Documentation" }
style = { changelog_title = "Styles" }
refactor = { changelog_title = "Refactoring" }
perf = { changelog_title = "Performance" }
test = { changelog_title = "Tests" }
build = { changelog_title = "Build System" }
ci = { changelog_title = "Continuous Integration" }
chore = { changelog_title = "Miscellaneous Chores" }
revert = { changelog_title = "Reverts" }
